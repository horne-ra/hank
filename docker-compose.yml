services:
  token-server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uv run uvicorn token_server:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  agent-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uv run python -m agent.worker dev
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/data
    depends_on:
      token-server:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://token-server:8000
    depends_on:
      token-server:
        condition: service_healthy
